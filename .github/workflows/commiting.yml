name: Auto Commit

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 14 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make change
        run: |
          echo "Update on $(date)" >> log.txt

      - name: Commit & Push
        run: |
          git config --global user.name "era"
          git config --global user.email "era@github.com"
          git add .
          git commit -m "auto: $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
name: Evolution Commit Bot

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 14 * * *"
    - cron: "0 22 * * *"
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: evolver-commit
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTH_CODE }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Random delay
        run: sleep $((RANDOM % 1800))

      - name: Evolve 1-3 files with balancing
        run: python automation/evolver/evolve.py --count-min 1 --count-max 3 --history-limit 365

      - name: Commit and push when changed
        run: |
          git config  user.name "devjayswal"
          git config  user.email "devjayswal404@gmail.com"
          git add apps automation/evolver .evolver
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(evolver): balanced state transition [bot]"
          git push
